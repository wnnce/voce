name: Setup TUI Environment
description: Installs Rust and TUI dependencies
runs:
  using: "composite"
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install TUI build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev
